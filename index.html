<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Idea Jar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:'Inter',sans-serif}
html,body{height:100%;background:#1a1a2e;color:#f4f3f7;overscroll-behavior:none}

#rainCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}

#app{max-width:480px;margin:0 auto;height:100%;display:flex;flex-direction:column;position:relative;z-index:1;background:transparent}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes ideaIn{0%{opacity:0;transform:scale(.88) translateY(20px)}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes heartPop{0%{transform:scale(1)}45%{transform:scale(1.45)}100%{transform:scale(1)}}

.scr{flex:1;overflow-y:auto;padding:28px 20px 140px;scrollbar-width:none;background:transparent}
.scr::-webkit-scrollbar{display:none}

/* HEADER */
.app-header{margin-bottom:26px;animation:fadeUp .45s ease both}
.app-name{font-size:22px;font-weight:900;color:#f4f3f7;letter-spacing:-0.5px;text-transform:uppercase;margin-bottom:6px;line-height:1}
.app-title{font-size:29px;font-weight:800;letter-spacing:-0.4px;line-height:1.15}
.app-sub{font-size:13.5px;color:#8b8a99;margin-top:5px}

/* FILTERS */
.filter-bar{margin-bottom:22px;animation:fadeUp .45s .06s ease both}
.filter-toggle{display:flex;align-items:center;gap:9px;background:#1b1f2a;border:1px solid #262b3a;border-radius:16px;padding:13px 16px;cursor:pointer;font-size:14px;font-weight:500;color:#9b9aa8;transition:border-color .2s;width:100%;text-align:left}
.filter-toggle.has-filters{border-color:#7c5cff;color:#a78bfa}
.filter-badge{background:#7c5cff;color:#fff;font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:9px;padding:0 5px;display:none;align-items:center;justify-content:center}
.filter-badge.show{display:flex}
.filter-chevron{font-size:16px;margin-left:auto;transition:transform .22s}
.filter-chevron.open{transform:rotate(180deg)}
.filter-panel{background:#1b1f2a;border:1px solid #262b3a;border-radius:20px;padding:18px;margin-top:10px;display:none}
.filter-panel.open{display:block;animation:fadeUp .25s ease both}
.fgroup{margin-bottom:16px}
.fgroup:last-of-type{margin-bottom:0}
.fgroup-label{font-size:10px;font-weight:700;color:#5a5968;letter-spacing:1.4px;text-transform:uppercase;margin-bottom:10px}
.fopts{display:flex;flex-wrap:wrap;gap:7px}
.fopt{padding:7px 13px;border-radius:100px;border:1px solid #363b4e;font-size:12.5px;color:#9b99b8;cursor:pointer;transition:all .15s;font-weight:500;background:#1e2235;user-select:none}
.fopt.sel{border-color:#7c5cff;color:#d4b8ff;background:rgba(124,92,255,.2)}
.filter-footer{display:flex;gap:9px;margin-top:16px;padding-top:16px;border-top:1px solid #262b3a}
.fclear{flex:1;padding:11px;border-radius:13px;background:transparent;border:1px solid #2a2f3e;color:#6b6a7a;font-size:13px;font-weight:600;cursor:pointer}
.fapply{flex:2;padding:11px;border-radius:13px;background:#7c5cff;border:none;color:#fff;font-size:13px;font-weight:700;cursor:pointer;transition:transform .12s}
.fapply:active{transform:scale(.96)}

/* CATEGORIES */
.sec-label{font-size:11px;font-weight:700;color:#5a5968;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px;animation:fadeUp .45s .1s ease both}
.cat-list{display:flex;flex-direction:column;gap:11px;animation:fadeUp .45s .12s ease both}
.cat-card{position:relative;border-radius:22px;padding:18px 20px;overflow:hidden;cursor:pointer;display:flex;align-items:center;gap:15px;transform:scale(1);transition:transform .22s cubic-bezier(.34,1.56,.64,1), box-shadow .22s ease;}
.cat-card:active{transform:scale(.96);}
.cat-card.sel{transform:scale(1.035);box-shadow:0 0 0 3px rgba(255,255,255,.25), 0 8px 24px rgba(0,0,0,.3);}
.cat-glow{position:absolute;top:-28px;right:-28px;width:100px;height:100px;border-radius:50%;filter:blur(20px);opacity:.5;pointer-events:none}
.cat-emoji{font-size:27px;position:relative;z-index:1;flex-shrink:0;line-height:1}
.cat-info{flex:1;position:relative;z-index:1;min-width:0}
.cat-name{font-size:16px;font-weight:700;letter-spacing:-0.1px}
.cat-count{font-size:11.5px;margin-top:2px;opacity:.6;font-weight:400}
.cat-arrow{position:relative;z-index:1;font-size:17px;opacity:.45;flex-shrink:0;transition:opacity .15s, transform .22s}
.cat-card.sel .cat-arrow{opacity:1;transform:translateX(3px)}

/* FAB */
.fab-wrap{position:fixed;bottom:calc(72px + max(env(safe-area-inset-bottom),0px));left:50%;transform:translateX(-50%);z-index:20;pointer-events:none;padding:0 24px;width:100%;max-width:480px}
.fab-gradient{padding-top:20px;pointer-events:none;display:flex;justify-content:center}
.fab-inner{display:inline-flex;position:relative;pointer-events:all}
.fab-inner::before{content:'';position:absolute;inset:-18px -28px;border-radius:100px;background:radial-gradient(ellipse at center, rgba(0,0,0,.72) 0%, transparent 70%);pointer-events:none;transition:background .15s;z-index:-1}
.fab-inner.flash::before{background:radial-gradient(ellipse at center, rgba(255,255,255,.22) 0%, transparent 70%)}
.fab{background:linear-gradient(135deg,#7c5cff,#9333ea);border:none;border-radius:100px;padding:17px 44px;color:#fff;font-weight:700;font-size:16px;cursor:pointer;display:flex;align-items:center;gap:9px;transition:transform .14s,box-shadow .14s;box-shadow:0 8px 28px rgba(124,92,255,.5);letter-spacing:.1px;white-space:nowrap;position:relative}
.fab:active{transform:scale(.95);box-shadow:0 4px 14px rgba(124,92,255,.4)}
.fab:disabled{opacity:.28;cursor:default;box-shadow:none}
#fabOrbit{position:absolute;pointer-events:none;z-index:10;top:0;left:0;width:100%;height:100%}

/* IDEA OVERLAY */
.overlay{position:absolute;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;padding:22px;pointer-events:none;opacity:0;transition:opacity .28s ease}
.overlay.show{opacity:1;pointer-events:all}
.overlay-bg{position:absolute;inset:0;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:rgba(10,12,18,.78);cursor:pointer}
.idea-card{position:relative;z-index:1;background:#1b1f2a;border-radius:28px;padding:28px 24px 24px;border:1px solid #2e3347;width:100%;max-width:400px;box-shadow:0 28px 70px rgba(0,0,0,.55);animation:ideaIn .4s cubic-bezier(.34,1.4,.64,1) both}
.idea-dismiss{position:absolute;top:16px;right:16px;width:34px;height:34px;border-radius:50%;background:#363b4e;border:1.5px solid #4a5068;color:#e0dff0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:color .15s,background .15s;font-size:16px;font-weight:800;line-height:1}
.idea-dismiss:hover{color:#fff;background:#4a5068}
.idea-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:100px;font-size:11px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;margin-bottom:16px}
.idea-title{font-size:21px;font-weight:700;line-height:1.3;letter-spacing:-0.25px;margin-bottom:8px}
.idea-sub{font-size:13.5px;color:#8b8a99;line-height:1.55;font-style:italic;margin-bottom:16px}
.idea-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:22px}
.idea-tag{font-size:11px;font-weight:500;padding:5px 11px;border-radius:100px;background:#262b3a;color:#9b9aa8}
.idea-btns{display:flex;gap:10px}
.idea-btn-new{flex:1;background:linear-gradient(135deg,#7c5cff,#9333ea);border:none;border-radius:16px;padding:15px;color:#fff;font-weight:700;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:transform .12s;box-shadow:0 6px 20px rgba(124,92,255,.38)}
.idea-btn-new:active{transform:scale(.96)}
.idea-btn-save{width:52px;height:52px;flex-shrink:0;background:#262b3a;border:1px solid #363b4e;border-radius:16px;display:flex;align-items:center;justify-content:center;color:#8b8a99;cursor:pointer;transition:all .15s}
.idea-btn-save:active{transform:scale(.88)}
.idea-btn-save.saved{color:#ff4d6d;border-color:rgba(255,77,109,.3);background:rgba(255,77,109,.09)}
.idea-btn-save.saved i{animation:heartPop .3s ease}
.idea-btn-share{width:52px;height:52px;flex-shrink:0;background:#262b3a;border:1px solid #363b4e;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;transition:all .15s}
.idea-btn-share:active{transform:scale(.88)}

/* SAVED */
.saved-scr{flex:1;overflow-y:auto;padding:28px 20px 100px;display:none;scrollbar-width:none}
.saved-scr::-webkit-scrollbar{display:none}
.saved-item{background:#1b1f2a;border-radius:18px;padding:15px 17px;margin-bottom:10px;border:1px solid #262b3a;display:flex;align-items:flex-start;gap:12px;cursor:pointer;transition:transform .12s;animation:fadeUp .3s ease both}
.saved-item:active{transform:scale(.97)}
.saved-emoji{font-size:22px;flex-shrink:0;margin-top:1px}
.saved-body{flex:1;min-width:0}
.saved-title{font-size:15px;font-weight:600;line-height:1.35;margin-bottom:3px}
.saved-cat{font-size:11.5px;color:#6b6a7a;font-weight:500}
.saved-del{width:30px;height:30px;background:none;border:none;color:#3a3a4a;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;border-radius:8px;transition:color .15s}
.saved-del:hover{color:#ff4d6d}

/* NAV */
.nav{background:transparent;backdrop-filter:none;border-top:none;display:flex;justify-content:space-around;align-items:center;padding:10px 16px;padding-bottom:max(env(safe-area-inset-bottom),10px);position:relative;z-index:30;gap:10px}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;opacity:.5;transition:all .2s;background:#1b1f2a;border:1px solid #262b3a;color:#9b9aa8;padding:10px 24px;border-radius:18px;flex:1}
.nav-btn.active{opacity:1;background:#262b3a;border-color:#7c5cff55;color:#f4f3f7}
.nav-btn.active i{color:#7c5cff}
.nav-icon{font-size:22px}
.nav-label{font-size:11px;font-weight:700;letter-spacing:.3px}

/* EMPTY + TOAST */
.empty{text-align:center;padding:64px 24px;animation:fadeUp .4s ease both}
.empty-emoji{font-size:44px;margin-bottom:14px;opacity:.5}
.empty-title{font-size:17px;font-weight:700;margin-bottom:6px}
.empty-sub{font-size:13.5px;color:#8b8a99;line-height:1.6}
.toast{position:absolute;top:20px;left:50%;transform:translateX(-50%);background:#1e2235;border:1px solid #7c5cff;border-radius:100px;padding:11px 20px;font-size:13px;font-weight:600;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .25s;z-index:60;display:flex;align-items:center;gap:7px}
.toast.show{opacity:1}
.hidden{display:none!important}
</style>
</head>
<body>

<canvas id="rainCanvas"></canvas>

<div id="app">
  <!-- HOME -->
  <div class="scr" id="homeScr">
    <div class="app-header">
      <div class="app-name">Idea Jar</div>
      <div class="app-title" id="app-title-text">What are you feeling today?</div>
      <div class="app-sub">Pick your category and get an idea!</div>
    </div>

    <div class="filter-bar">
      <button class="filter-toggle" id="filterToggle" onclick="toggleFilters()">
        <i class="ti ti-adjustments-horizontal" style="font-size:17px"></i>
        Filters
        <span class="filter-badge" id="filterBadge">0</span>
        <i class="ti ti-chevron-down filter-chevron" id="filterChevron"></i>
      </button>
      <div class="filter-panel" id="filterPanel">
        <div class="fgroup"><div class="fgroup-label">People</div><div class="fopts" id="fPeople"></div></div>
        <div class="fgroup"><div class="fgroup-label">Location</div><div class="fopts" id="fLocation"></div></div>
        <div class="fgroup"><div class="fgroup-label">Cost</div><div class="fopts" id="fCost"></div></div>
        <div class="fgroup"><div class="fgroup-label">Duration</div><div class="fopts" id="fDuration"></div></div>
        <div class="fgroup"><div class="fgroup-label">Energy</div><div class="fopts" id="fEnergy"></div></div>
        <div class="filter-footer">
          <button class="fclear" onclick="clearFilters()">Clear all</button>
          <button class="fapply" onclick="closeFilters()">Apply</button>
        </div>
      </div>
    </div>

    <div class="sec-label">Categories</div>
    <div class="cat-list" id="catList"></div>
  </div>

  <!-- SAVED -->
  <div class="saved-scr" id="savedScr">
    <div class="app-header">
      <div class="app-name">Idea Jar</div>
      <div class="app-title">My ideas</div>
      <div class="app-sub">Your future nostalgia</div>
    </div>
    <div id="savedList"></div>
  </div>

  <!-- OVERLAY -->
  <div class="overlay" id="overlay">
    <div class="overlay-bg" onclick="dismissIdea()"></div>
    <div class="idea-card" id="ideaCard">
      <button class="idea-dismiss" onclick="dismissIdea()">×</button>
      <div class="idea-badge" id="ideaBadge"></div>
      <div class="idea-title" id="ideaTitle"></div>
      <div class="idea-sub" id="ideaSub"></div>
      <div class="idea-tags" id="ideaTags"></div>
      <div class="idea-btns">
        <button class="idea-btn-new" onclick="newIdea()"><i class="ti ti-refresh" style="font-size:16px"></i> New idea</button>
        <button class="idea-btn-share" onclick="shareIdea()">📤</button>
        <button class="idea-btn-save" id="ideaSaveBtn" onclick="toggleSave()"><span id="saveIcon" style="font-size:20px">🤍</span></button>
      </div>
    </div>
  </div>

  <!-- FAB -->
  <div class="fab-wrap" id="fabWrap">
    <div class="fab-gradient">
      <div class="fab-inner" id="fabInner">
        <button class="fab" id="fab" onclick="fabClick()" disabled>
          <canvas id="fabOrbit"></canvas>
          <i class="ti ti-bulb" style="font-size:19px;position:relative;z-index:1"></i> <span style="position:relative;z-index:1">Give me an idea</span>
        </button>
      </div>
    </div>
  </div>

  <!-- NAV -->
  <nav class="nav">
    <button class="nav-btn active" id="navHome" onclick="showTab('home')">
      <i class="ti ti-sparkles nav-icon"></i>
      <span class="nav-label">Home</span>
    </button>
    <button class="nav-btn" id="navSaved" onclick="showTab('saved')">
      <i class="ti ti-heart nav-icon"></i>
      <span class="nav-label">My Ideas</span>
    </button>
  </nav>

  <div class="toast" id="toast"></div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
<script>
/* ── BG ANIMATION ENGINE ── */
(function(){
  const canvas = document.getElementById('rainCanvas');
  const ctx = canvas.getContext('2d');
  let W, H;
  let particles = [];
  let currentMode = 'default';
  let nextMode = null;
  let fading = false;

  function resize(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  /* ── GRADIENTS PER MODE ── */
  const GRADIENTS = {
    default:        { stops:[[0,'#1a1a2e'],[1,'#16213e']] },
    rain:           { stops:[[0,'#4a5568'],[0.5,'#2d3748'],[1,'#1a202c']] },
    adventure:      { stops:[[0,'#1a1a2e'],[0.35,'#4a1942'],[0.65,'#c2410c'],[0.85,'#f59e0b'],[1,'#fbbf24']] },
    summer:         { stops:[[0,'#0ea5e9'],[0.5,'#38bdf8'],[1,'#7dd3fc']] },
    romantic:       { stops:[[0,'#831843'],[0.5,'#be185d'],[1,'#f9a8d4']] },
    fun:            { stops:[[0,'#92400e'],[0.5,'#d97706'],[1,'#fbbf24']] },
    party:          { stops:[[0,'#1e1b4b'],[0.5,'#4c1d95'],[1,'#7c3aed']] },
    crazy:          { stops:[[0,'#450a0a'],[0.5,'#991b1b'],[1,'#ef4444']] },
    selfimprovement:{ stops:[[0,'#042f2e'],[0.5,'#0f766e'],[1,'#2dd4bf']] },
  };

  function applyGradient(mode){
    const def = GRADIENTS[mode] || GRADIENTS.default;
    const grad = ctx.createLinearGradient(0,0,0,H);
    def.stops.forEach(([pos,color]) => grad.addColorStop(pos, color));
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,W,H);
  }

  /* ── COLOR LERP FOR TRANSITION ── */
  function hexToRgb(hex){ return [parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)]; }
  function rgbToHex(r,g,b){ return '#'+[r,g,b].map(v=>Math.round(Math.max(0,Math.min(255,v))).toString(16).padStart(2,'0')).join(''); }
  function lerpColor(a,b,t){ const [r1,g1,b1]=hexToRgb(a),[r2,g2,b2]=hexToRgb(b); return rgbToHex(r1+(r2-r1)*t,g1+(g2-g1)*t,b1+(b2-b1)*t); }
  function lerpGradient(from, to, t){
    const len = Math.max(from.stops.length, to.stops.length);
    const result = [];
    for(let i=0;i<len;i++){
      const fi = Math.min(i, from.stops.length-1);
      const ti = Math.min(i, to.stops.length-1);
      const pos = from.stops[fi][0] + (to.stops[ti][0]-from.stops[fi][0])*t;
      const color = lerpColor(from.stops[fi][1], to.stops[ti][1], t);
      result.push([pos, color]);
    }
    return {stops:result};
  }

  let currentGrad = GRADIENTS.default;
  let targetGrad = GRADIENTS.default;
  let transProgress = 1;
  let transitioning = false;

  /* ── PARTICLE FACTORIES ── */
  function makeRain(){
    return { type:'rain', x:Math.random()*W, y:Math.random()*H,
      len:10+Math.random()*18, speed:0.5+Math.random()*0.8,
      opacity:0.25+Math.random()*0.35, width:0.7+Math.random()*0.8 };
  }
  function makeCloud(){
    return { type:'cloud', x:Math.random()*W*1.4 - W*0.2, y:Math.random()*H*0.5,
      w:80+Math.random()*120, h:35+Math.random()*45,
      speed:0.08+Math.random()*0.12, opacity:0.06+Math.random()*0.12 };
  }
  function makeStar(){
    return { type:'star', x:Math.random()*W, y:Math.random()*H*0.75,
      r:0.6+Math.random()*2, pulse:Math.random()*Math.PI*2,
      pulseSpeed:0.008+Math.random()*0.02, opacity:0.3+Math.random()*0.7,
      twinkle:0.4+Math.random()*0.5, warm:Math.random()>0.6 };
  }
  function makeConfetti(){
    const colors=['#ffd23f','#ff6b9d','#7c5cff','#4ade80','#ff8a4c','#5fd4c4','#c265ff','#f472b6'];
    return { type:'confetti', x:Math.random()*W, y:-10-Math.random()*H,
      w:5+Math.random()*8, h:3+Math.random()*5,
      speed:0.8+Math.random()*1.3, drift:(-0.6+Math.random())*1.0,
      rot:Math.random()*Math.PI*2, rotSpeed:(-0.06+Math.random()*0.12),
      color:colors[Math.floor(Math.random()*colors.length)], opacity:0.75+Math.random()*0.25 };
  }
  function makeHeart(){
    const pinks=['#ff6b9d','#fb7185','#f472b6','#ec4899','#ff8fab'];
    return { type:'heart', x:Math.random()*W, y:H+20,
      size:7+Math.random()*14, speed:0.35+Math.random()*0.65,
      drift:(-0.4+Math.random()*0.8), opacity:0.25+Math.random()*0.5,
      wobble:Math.random()*Math.PI*2, wobbleSpeed:0.015+Math.random()*0.025,
      color:pinks[Math.floor(Math.random()*pinks.length)] };
  }
  function makeParticle(){
    return { type:'particle', x:Math.random()*W, y:H+10,
      r:1+Math.random()*3, speed:0.3+Math.random()*0.7,
      opacity:0.15+Math.random()*0.4, drift:(-0.25+Math.random()*0.5),
      pulse:Math.random()*Math.PI*2, pulseSpeed:0.02+Math.random()*0.04,
      color:Math.random()>0.5?'45,212,191':'16,185,129' };
  }
  function makeDanger(){
    const shapes=['triangle','bolt'];
    return { type:'danger', x:Math.random()*W, y:-30-Math.random()*H,
      shape:shapes[Math.floor(Math.random()*shapes.length)],
      size:9+Math.random()*16, speed:0.35+Math.random()*0.55,
      rot:Math.random()*Math.PI*2, rotSpeed:(-0.025+Math.random()*0.05),
      opacity:0.3+Math.random()*0.45,
      color:Math.random()>0.5?'#ff4d4d':'#ffd23f' };
  }
  function makeSunSparkle(){
    return { type:'sunsparkle', x:Math.random()*W, y:Math.random()*H,
      size:1+Math.random()*3, pulse:Math.random()*Math.PI*2,
      pulseSpeed:0.02+Math.random()*0.04,
      opacity:0.15+Math.random()*0.4,
      drift:(-0.1+Math.random()*0.2), rise:-0.1-Math.random()*0.25 };
  }

  const MODES = {
    default:        { factories:[makeRain],                    counts:[200] },
    rain:           { factories:[makeRain, makeCloud],         counts:[500, 12] },
    adventure:      { factories:[makeStar],                    counts:[220] },
    fun:            { factories:[makeConfetti],                 counts:[140] },
    romantic:       { factories:[makeHeart],                   counts:[70]  },
    party:          { factories:[makeConfetti],                 counts:[200] },
    crazy:          { factories:[makeDanger],                   counts:[100] },
    selfimprovement:{ factories:[makeParticle],                counts:[160] },
    summer:         { factories:[makeSunSparkle],              counts:[150] },
  };

  function initParticles(mode){
    particles = [];
    const def = MODES[mode] || MODES.default;
    def.factories.forEach((factory, i) => {
      const count = def.counts[i] || 100;
      for(let j=0;j<count;j++) particles.push(factory());
    });
  }

  /* ── DRAW HELPERS ── */
  function drawHeart(x, y, size){
    ctx.beginPath();
    ctx.moveTo(x, y+size*0.3);
    ctx.bezierCurveTo(x, y, x-size*0.5, y, x-size*0.5, y+size*0.3);
    ctx.bezierCurveTo(x-size*0.5, y+size*0.6, x, y+size*0.9, x, y+size);
    ctx.bezierCurveTo(x, y+size*0.9, x+size*0.5, y+size*0.6, x+size*0.5, y+size*0.3);
    ctx.bezierCurveTo(x+size*0.5, y, x, y, x, y+size*0.3);
    ctx.closePath();
  }
  function drawBolt(x, y, size){
    ctx.beginPath();
    ctx.moveTo(x+size*0.3,y); ctx.lineTo(x-size*0.1,y+size*0.45);
    ctx.lineTo(x+size*0.1,y+size*0.45); ctx.lineTo(x-size*0.3,y+size);
    ctx.lineTo(x+size*0.15,y+size*0.55); ctx.lineTo(x-size*0.05,y+size*0.55);
    ctx.closePath();
  }
  function drawCloudShape(x, y, w, h){
    ctx.beginPath();
    ctx.ellipse(x, y, w*0.5, h*0.45, 0, 0, Math.PI*2);
    ctx.ellipse(x-w*0.22, y+h*0.1, w*0.32, h*0.35, 0, 0, Math.PI*2);
    ctx.ellipse(x+w*0.22, y+h*0.08, w*0.28, h*0.32, 0, 0, Math.PI*2);
  }

  /* ── UPDATE + DRAW ── */
  function updateDraw(p){
    switch(p.type){

      case 'rain':
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p.x+p.len*0.15, p.y+p.len);
        ctx.strokeStyle=`rgba(200,220,255,${p.opacity})`;
        ctx.lineWidth=p.width; ctx.lineCap='round'; ctx.stroke();
        p.y+=p.speed; p.x+=p.speed*0.15;
        if(p.y>H+p.len){ p.x=Math.random()*W; p.y=-p.len; }
        break;

      case 'cloud':
        ctx.save();
        ctx.globalAlpha=p.opacity;
        ctx.fillStyle='#e2e8f0';
        drawCloudShape(p.x, p.y, p.w, p.h);
        ctx.fill();
        ctx.restore();
        p.x+=p.speed;
        if(p.x>W+p.w){ p.x=-p.w; p.y=Math.random()*H*0.5; }
        break;

      case 'star':
        p.pulse+=p.pulseSpeed;
        const brightness=p.opacity+Math.sin(p.pulse)*p.twinkle*0.4;
        const sr=p.r*(0.8+Math.sin(p.pulse)*0.3);
        const starColor = p.warm ? `rgba(255,220,150,${Math.max(0,brightness)})` : `rgba(220,210,255,${Math.max(0,brightness)})`;
        ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(0.1,sr),0,Math.PI*2);
        ctx.fillStyle=starColor; ctx.fill();
        if(brightness>0.5){
          ctx.beginPath(); ctx.arc(p.x,p.y,sr*3,0,Math.PI*2);
          ctx.fillStyle=p.warm?`rgba(255,180,80,${brightness*0.1})`:`rgba(180,160,255,${brightness*0.08})`; ctx.fill();
        }
        break;

      case 'confetti':
        ctx.save();
        ctx.translate(p.x+p.w/2, p.y+p.h/2); ctx.rotate(p.rot);
        ctx.fillStyle=p.color; ctx.globalAlpha=p.opacity;
        ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
        ctx.restore(); ctx.globalAlpha=1;
        p.y+=p.speed; p.x+=p.drift; p.rot+=p.rotSpeed;
        if(p.y>H+20){ Object.assign(p,makeConfetti()); p.y=-10; }
        break;

      case 'heart':
        p.wobble+=p.wobbleSpeed;
        ctx.save(); ctx.globalAlpha=p.opacity; ctx.fillStyle=p.color;
        drawHeart(p.x+Math.sin(p.wobble)*5-p.size/2, p.y-p.size, p.size);
        ctx.fill(); ctx.restore(); ctx.globalAlpha=1;
        p.y-=p.speed; p.x+=p.drift;
        if(p.y<-p.size*2){ Object.assign(p,makeHeart()); }
        break;

      case 'particle':
        p.pulse+=p.pulseSpeed;
        const pop=p.opacity*(0.6+Math.sin(p.pulse)*0.4);
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(${p.color},${Math.max(0,pop)})`; ctx.fill();
        // glow
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r*2.5,0,Math.PI*2);
        ctx.fillStyle=`rgba(${p.color},${Math.max(0,pop)*0.15})`; ctx.fill();
        p.y-=p.speed; p.x+=p.drift;
        if(p.y<-10){ Object.assign(p,makeParticle()); }
        break;

      case 'danger':
        ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
        ctx.globalAlpha=p.opacity; ctx.fillStyle=p.color;
        if(p.shape==='triangle'){
          ctx.beginPath();
          ctx.moveTo(0,-p.size); ctx.lineTo(p.size*0.87,p.size*0.5);
          ctx.lineTo(-p.size*0.87,p.size*0.5); ctx.closePath(); ctx.fill();
          ctx.fillStyle='rgba(0,0,0,0.6)';
          ctx.font=`bold ${p.size*0.9}px Inter`;
          ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText('!',0,p.size*0.15);
        } else { drawBolt(0,0,p.size); ctx.fill(); }
        ctx.restore(); ctx.globalAlpha=1;
        p.y+=p.speed; p.rot+=p.rotSpeed;
        if(p.y>H+40){ Object.assign(p,makeDanger()); p.y=-30; }
        break;

      case 'sunsparkle':
        p.pulse+=p.pulseSpeed;
        const sp=p.size*(0.7+Math.sin(p.pulse)*0.5);
        const so=p.opacity*(0.5+Math.sin(p.pulse)*0.5);
        ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(0.1,sp),0,Math.PI*2);
        ctx.fillStyle=`rgba(255,240,150,${so})`; ctx.fill();
        ctx.beginPath(); ctx.arc(p.x,p.y,sp*3,0,Math.PI*2);
        ctx.fillStyle=`rgba(255,220,80,${so*0.12})`; ctx.fill();
        p.y+=p.rise; p.x+=p.drift;
        if(p.y<-10||p.y>H+10){ Object.assign(p,makeSunSparkle()); }
        break;
    }
  }

  /* ── GRADIENT TRANSITION ── */
  let gradFrom = GRADIENTS.default;
  let gradTo   = GRADIENTS.default;
  let gradT    = 1;

  window.setBgMode = function(mode){
    const newGrad = GRADIENTS[mode] || GRADIENTS.default;
    gradFrom = lerpGradient(gradFrom, gradTo, gradT); // snapshot current
    gradTo   = newGrad;
    gradT    = 0;

    const particleMode = (mode === 'default') ? 'default' : mode;
    if(particleMode === currentMode) return;
    if(fading) return;
    fading = true;
    nextMode = particleMode;
    let alpha = 1;
    const fadeOut = setInterval(()=>{
      alpha -= 0.08;
      canvas.style.opacity = Math.max(0, alpha);
      if(alpha <= 0){
        clearInterval(fadeOut);
        currentMode = nextMode;
        initParticles(currentMode);
        let a2 = 0;
        const fadeIn = setInterval(()=>{
          a2 += 0.08;
          canvas.style.opacity = Math.min(1, a2);
          if(a2 >= 1){ clearInterval(fadeIn); fading=false; }
        }, 16);
      }
    }, 16);
  };

  /* ── MAIN LOOP ── */
  function draw(){
    // advance gradient transition
    if(gradT < 1){
      gradT = Math.min(gradT + 0.012, 1);
    }
    const displayGrad = lerpGradient(gradFrom, gradTo, gradT < 1 ? gradT*gradT*(3-2*gradT) : 1);
    const grad = ctx.createLinearGradient(0,0,0,H);
    displayGrad.stops.forEach(([pos,color]) => { try{ grad.addColorStop(pos,color); }catch(e){} });
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,W,H);

    particles.forEach(updateDraw);
    requestAnimationFrame(draw);
  }

  initParticles('default');
  draw();
})();
</script>

<script>
/* ── ORBITING DOT ON FAB ── */
(function(){
  function initOrbit(){
    const fab = document.getElementById('fab');
    const c   = document.getElementById('fabOrbit');
    if(!fab || !c) return;

    function resize(){
      const r = fab.getBoundingClientRect();
      c.width  = r.width;
      c.height = r.height;
      c.style.position = 'absolute';
      c.style.top  = '0';
      c.style.left = '0';
    }
    resize();
    window.addEventListener('resize', resize);

    const ctx = c.getContext('2d');
    let t = 0; // 0..1 around perimeter
    const TRAIL = 55;
    const history = [];
    const DOT_R = 2.2;
    const OFFSET = 1;    // right on border

    // get point on rounded-rect perimeter at parameter t [0,1]
    function perimeterPoint(t){
      const W = c.width, H = c.height;
      const r = H / 2; // pill shape radius
      // straight segments + two semicircles
      const straightLen = W - 2*r;
      const arcLen = Math.PI * r;
      const total = 2*straightLen + 2*arcLen;
      let d = t * total;

      // top edge (left→right)
      if(d < straightLen){
        return { x: r + d, y: OFFSET };
      }
      d -= straightLen;
      // right semicircle (top→bottom)
      if(d < arcLen){
        const a = -Math.PI/2 + (d/arcLen)*Math.PI;
        return { x: W - r + Math.cos(a)*(r-OFFSET), y: H/2 + Math.sin(a)*(r-OFFSET) };
      }
      d -= arcLen;
      // bottom edge (right→left)
      if(d < straightLen){
        return { x: W - r - d, y: H - OFFSET };
      }
      d -= straightLen;
      // left semicircle (bottom→top)
      const a = Math.PI/2 + (d/arcLen)*Math.PI;
      return { x: r + Math.cos(a)*(r-OFFSET), y: H/2 + Math.sin(a)*(r-OFFSET) };
    }

    function draw(){
      ctx.clearRect(0, 0, c.width, c.height);
      if(fab.disabled){ requestAnimationFrame(draw); return; }

      t = (t + 0.0015) % 1; // slower

      const pt = perimeterPoint(t);
      history.push({...pt});
      if(history.length > TRAIL) history.shift();

      // trail
      history.forEach((p, i) => {
        const frac = i / TRAIL;
        ctx.beginPath();
        ctx.arc(p.x, p.y, DOT_R * (0.3 + frac*0.7), 0, Math.PI*2);
        ctx.fillStyle = `rgba(255,255,255,${frac * 0.55})`;
        ctx.fill();
      });

      // head
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, DOT_R, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,255,0.95)';
      ctx.fill();
      // soft glow
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, DOT_R * 3, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.fill();

      requestAnimationFrame(draw);
    }
    draw();
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', initOrbit);
  } else {
    initOrbit();
  }
})();
</script>

  });
