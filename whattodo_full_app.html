</div>

]}
};

let activeCat = null;
let filters = {people:[],loc:[],cost:[],dur:[],energy:[]};

const FILTER_DEFS = {
  people:{label:'Ljudje',opts:['Solo','Couple','Friends','Family']},
  loc:{label:'Lokacija',opts:['Home','City','Nature','Road Trip','Outdoors']},
  cost:{label:'Cena',opts:['Free','Under €10','Under €20','Under €50','Expensive']},
  dur:{label:'Trajanje',opts:['15min','30min','1 Hour','Half Day','Full Day','Evening','Multiple Days']},
  energy:{label:'Energija',opts:['Lazy','Chill','Active','High Energy']}
};

function renderCats(){
  const row = document.getElementById('catsRow');
  row.innerHTML='';
  Object.keys(DATA).forEach(key=>{
    const cat = DATA[key];
    const chip = document.createElement('div');
    chip.className='cat-chip'+(activeCat===key?' active':'');
    if(activeCat===key){chip.style.background=cat.color;chip.style.borderColor=cat.color;}
    chip.innerHTML=`${cat.emoji} ${cat.label}`;
    chip.onclick=()=>selectCat(key);
    row.appendChild(chip);
  });
}

function selectCat(key){
  activeCat = activeCat===key?null:key;
  document.getElementById('btnMain').disabled = !activeCat;
  renderCats();
  updateCount();
  if(!activeCat){
    document.getElementById('resultZone').innerHTML='<div class="empty"><div class="empty-txt">izberi kategorijo<br>ali pritisni Random</div></div>';
  }
}

function matchesFilters(idea){
  if(filters.people.length && !idea.people.some(p=>filters.people.includes(p))) return false;
  if(filters.loc.length && !idea.loc.some(l=>filters.loc.includes(l))) return false;
  if(filters.cost.length && !filters.cost.includes(idea.cost)) return false;
  if(filters.dur.length && !filters.dur.includes(idea.dur)) return false;
  if(filters.energy.length && !filters.energy.includes(idea.energy)) return false;
  return true;
}

function getFilteredIdeas(key){
  return DATA[key].ideas.filter(matchesFilters);
}

function updateCount(){
  const total = Object.values(filters).reduce((a,f)=>a+f.length,0);
  const fc = document.getElementById('fcount');
  fc.style.display = total>0?'flex':'none';
  fc.textContent = total;

  if(activeCat){
    const n = getFilteredIdeas(activeCat).length;
    document.getElementById('resultCount').textContent = n+' idej ustreza filtru';
  } else {
    document.getElementById('resultCount').textContent = 'izberi kategorijo ali pritisni random';
  }
}

function rollIdea(forceKey){
  const key = forceKey||activeCat;
  if(!key) return;
  const pool = getFilteredIdeas(key);
  if(pool.length===0){
    document.getElementById('resultZone').innerHTML='<div class="empty"><div class="empty-txt">Nobena ideja ne ustreza filtrom<br>Poskusi počistiti filtre</div></div>';
    return;
  }
  const cat = DATA[key];
  const idea = pool[Math.floor(Math.random()*pool.length)];
  document.getElementById('resultZone').innerHTML=`
    <div class="card" id="rcard">
      <span class="card-badge" style="background:${cat.color}25;color:${cat.color}">${cat.emoji} ${cat.label}</span>
      <div class="card-title">${idea.t}</div>
      <div class="card-sub">${idea.s||''}</div>
      <div class="tag-row">
        ${idea.people.map(p=>`<span class="tag">${p}</span>`).join('')}
        ${idea.loc.map(l=>`<span class="tag">${l}</span>`).join('')}
        <span class="tag">${idea.cost}</span>
        <span class="tag">${idea.dur}</span>
      </div>
    </div>`;
  const c = document.getElementById('rcard');
  c.style.animation='none';void c.offsetWidth;c.style.animation='popIn .35s cubic-bezier(.34,1.4,.64,1) both';
}

function surpriseMe(){
  const keys = Object.keys(DATA).filter(k=>getFilteredIdeas(k).length>0);
  if(keys.length===0){
    document.getElementById('resultZone').innerHTML='<div class="empty"><div class="empty-txt">Nobena ideja ne ustreza filtrom</div></div>';
    return;
  }
  const key = keys[Math.floor(Math.random()*keys.length)];
  activeCat = key;
  document.getElementById('btnMain').disabled=false;
  renderCats();
  updateCount();
  rollIdea(key);
}

function openFilters(){
  const container = document.getElementById('filterGroups');
  container.innerHTML='';
  Object.keys(FILTER_DEFS).forEach(fkey=>{
    const def = FILTER_DEFS[fkey];
    const group = document.createElement('div');
    group.className='filter-group';
    group.innerHTML=`<div class="filter-label">${def.label}</div><div class="opt-grid" id="grp-${fkey}"></div>`;
    container.appendChild(group);
    const grid = group.querySelector('.opt-grid');
    def.opts.forEach(opt=>{
      const btn = document.createElement('div');
      btn.className='opt'+(filters[fkey].includes(opt)?' sel':'');
      btn.textContent=opt;
      btn.onclick=()=>{
        if(filters[fkey].includes(opt)){
          filters[fkey]=filters[fkey].filter(x=>x!==opt);
          btn.classList.remove('sel');
        } else {
          filters[fkey].push(opt);
          btn.classList.add('sel');
        }
        updateCount();
      };
      grid.appendChild(btn);
    });
  });
  document.getElementById('filterOverlay').classList.add('open');
}

function closeFilters(){
  document.getElementById('filterOverlay').classList.remove('open');
  updateCount();
}
function closeFiltersBg(e){
  if(e.target===document.getElementById('filterOverlay')) closeFilters();
}
function clearFilters(){
  Object.keys(filters).forEach(k=>filters[k]=[]);
  openFilters();
  updateCount();
}

renderCats();
updateCount();
</script>
